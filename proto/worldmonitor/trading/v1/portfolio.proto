syntax = "proto3";

package worldmonitor.trading.v1;

import "sebuf/http/annotations.proto";

message PortfolioHolding {
  string symbol = 1;
  string name = 2;
  double quantity = 3;
  double avg_cost_basis = 4;
  double current_price = 5;
  double market_value = 6;
  double unrealized_pnl = 7;
  double unrealized_pnl_pct = 8;
  double weight = 9;
  string sector = 10;
  string asset_type = 11;
}

message TradeRecord {
  string id = 1;
  string timestamp = 2;
  string symbol = 3;
  string side = 4;
  double quantity = 5;
  double price = 6;
  string reasoning = 7;
  double agent_consensus = 8;
  string triggered_by = 9;
}

message PerformanceMetrics {
  double daily_return = 1;
  double weekly_return = 2;
  double monthly_return = 3;
  double ytd_return = 4;
  double all_time_return = 5;
  double total_value = 6;
  double total_cost = 7;
}

message RiskMetrics {
  double sharpe_ratio = 1;
  double max_drawdown = 2;
  double portfolio_beta = 3;
  double var_95 = 4;
  double concentration_risk = 5;
  double cash_pct = 6;
}

message Portfolio {
  string id = 1;
  string user_id = 2;
  string name = 3;
  double cash = 4;
  string currency = 5;
  repeated PortfolioHolding holdings = 6;
  repeated TradeRecord trade_history = 7;
  PerformanceMetrics performance = 8;
  RiskMetrics risk_metrics = 9;
  string created_at = 10;
  string updated_at = 11;
}
